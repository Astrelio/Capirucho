[build]
  base = "."
  command = "npm install --prefix frontend && npm run build"
  publish = "frontend/dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[dev]
  command = "npm run dev --prefix frontend"
  targetPort = 5173
  port = 8888
  framework = "#custom"

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
